<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <title>Tort House Admin</title>
</head>
<body>

<h1>Tort House Admin</h1>

<div id="loginBox">
  <h2>Admin Login</h2>
  <input id="email" type="email" placeholder="Email"><br><br>
  <input id="password" type="password" placeholder="Parol"><br><br>
  <button onclick="login()">Kirish</button>
</div>

<div id="adminBox" style="display:none;">
  <button onclick="logout()">Chiqish</button>

  <h2 id="formTitle">Mahsulot qo‘shish</h2>

  <input id="name" placeholder="Mahsulot nomi"><br><br>
  <input id="price" placeholder="Narx"><br><br>
  <input id="category" placeholder="Kategoriya"><br><br>
  <input id="image" placeholder="Rasm URL"><br><br>
  <textarea id="description" placeholder="Tavsif"></textarea><br><br>

  <button onclick="saveProduct()" id="saveBtn">Qo‘shish</button>
  <button onclick="cancelEdit()" id="cancelBtn" style="display:none;">Bekor qilish</button>

  <hr>

  <h2>Mahsulotlar</h2>
  <div id="list"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  doc,
  updateDoc,
  deleteDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import {
  getAuth,
  signInWithEmailAndPassword,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCsx23vnQ4jvGv0reltApc4fEvhF9VHKIU",
  authDomain: "tort-house.firebaseapp.com",
  projectId: "tort-house",
  storageBucket: "tort-house.firebasestorage.app",
  messagingSenderId: "531646484923",
  appId: "1:531646484923:web:e40a50fabf50519d9ab49e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const loginBox = document.getElementById("loginBox");
const adminBox = document.getElementById("adminBox");
const listDiv = document.getElementById("list");

let editingId = null;

onAuthStateChanged(auth, (user) => {
  if (user) {
    loginBox.style.display = "none";
    adminBox.style.display = "block";
    loadProducts();
  } else {
    loginBox.style.display = "block";
    adminBox.style.display = "none";
  }
});

window.login = async function () {
  try {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    await signInWithEmailAndPassword(auth, email, password);
    alert("Kirdingiz!");
  } catch (error) {
    alert("Login xato: " + error.message);
  }
};

window.logout = async function () {
  await signOut(auth);
};

async function loadProducts() {
  const querySnapshot = await getDocs(collection(db, "products"));
  listDiv.innerHTML = "";

  querySnapshot.forEach((item) => {
    const data = item.data();

    listDiv.innerHTML += `
      <div style="border:1px solid #ddd; padding:12px; margin:10px 0; border-radius:8px;">
        <h3>${data.name}</h3>
        <p>${data.description || ""}</p>
        <b>${data.price} so'm</b>
        <p>Kategoriya: ${data.category}</p>
        <button onclick='editProduct("${item.id}", ${JSON.stringify(data).replace(/'/g, "&apos;")})'>Edit</button>
        <button onclick='deleteProduct("${item.id}")'>Delete</button>
      </div>
    `;
  });
}

window.saveProduct = async function () {
  const name = document.getElementById("name").value;
  const price = parseInt(document.getElementById("price").value);
  const category = document.getElementById("category").value;
  const image = document.getElementById("image").value;
  const description = document.getElementById("description").value;

  const productData = {
    name,
    price,
    category,
    image,
    description,
    available: true
  };

  if (editingId) {
    await updateDoc(doc(db, "products", editingId), productData);
    alert("Mahsulot yangilandi!");
  } else {
    await addDoc(collection(db, "products"), productData);
    alert("Mahsulot qo‘shildi!");
  }

  clearForm();
  loadProducts();
};

window.editProduct = function (id, data) {
  editingId = id;

  document.getElementById("name").value = data.name || "";
  document.getElementById("price").value = data.price || "";
  document.getElementById("category").value = data.category || "";
  document.getElementById("image").value = data.image || "";
  document.getElementById("description").value = data.description || "";

  document.getElementById("formTitle").innerText = "Mahsulotni tahrirlash";
  document.getElementById("saveBtn").innerText = "Saqlash";
  document.getElementById("cancelBtn").style.display = "inline-block";
};

window.cancelEdit = function () {
  clearForm();
};

window.deleteProduct = async function (id) {
  const confirmDelete = confirm("Rostdan ham o‘chirmoqchimisiz?");
  if (!confirmDelete) return;

  await deleteDoc(doc(db, "products", id));
  alert("Mahsulot o‘chirildi!");
  loadProducts();
};

function clearForm() {
  editingId = null;

  document.getElementById("name").value = "";
  document.getElementById("price").value = "";
  document.getElementById("category").value = "";
  document.getElementById("image").value = "";
  document.getElementById("description").value = "";

  document.getElementById("formTitle").innerText = "Mahsulot qo‘shish";
  document.getElementById("saveBtn").innerText = "Qo‘shish";
  document.getElementById("cancelBtn").style.display = "none";
}
</script>

</body>
</html>
